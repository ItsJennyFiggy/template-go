name: Release Docker Image (GHCR)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Required for GoReleaser to upload binaries to the Release page
  packages: write  # Required for ko to push images to GHCR

jobs:
  goreleaser:
    name: Build Binaries and Containers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # GoReleaser needs the full git history for changelog generation

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repository name
        id: repo
        run: |
          echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KO_REPO: ghcr.io/${{ steps.repo.outputs.name }}
