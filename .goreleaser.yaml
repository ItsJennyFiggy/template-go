version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    main: ./cmd/app
    flags:
      - -trimpath
    ldflags:
      - -s -w

kos:
  - repositories:
      - "{{.Env.KO_REPO}}"
    tags:
      - latest
      - "{{.Version}}"
    bare: true
    preserve_import_paths: false
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.source: "{{.GitURL}}"

changelog:
  disable: true
